# Keeps this fork up to date with open-telemetry/opentelemetry-demo upstream.
# Runs weekly. Fetches upstream main, merges into a sync branch off our main,
# and opens a PR. Custom patches (imageLoader.js, Faro instrumentation,
# publish-* workflows) stay on top and are reviewed at PR time. If the merge
# conflicts, the PR is still opened with conflict markers so it's visible.
name: Sync from upstream

on:
  schedule:
    # Mondays at 06:00 UTC — quiet window, fresh PR for the week.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream ref to sync from (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote
        run: git remote add upstream https://github.com/open-telemetry/opentelemetry-demo.git

      - name: Fetch upstream
        run: git fetch upstream --tags

      - name: Compute branch + status
        id: prep
        run: |
          REF="${{ github.event.inputs.upstream_ref || 'main' }}"
          UPSTREAM_SHA=$(git rev-parse "upstream/$REF")
          UPSTREAM_SHORT="${UPSTREAM_SHA::12}"
          BRANCH="sync/upstream-$(date -u +%Y-%m-%d)-${UPSTREAM_SHORT}"
          # If we're already at upstream tip, nothing to do.
          AHEAD=$(git rev-list --count "upstream/$REF..HEAD")
          BEHIND=$(git rev-list --count "HEAD..upstream/$REF")
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Fork is $AHEAD commits ahead and $BEHIND commits behind upstream/$REF"

      - name: Nothing to sync
        if: steps.prep.outputs.behind == '0'
        run: echo "::notice::Fork is already up to date with upstream."

      - name: Create sync branch and attempt merge
        id: merge
        if: steps.prep.outputs.behind != '0'
        run: |
          git checkout -b "${{ steps.prep.outputs.branch }}"
          if git merge --no-edit "upstream/${{ steps.prep.outputs.ref }}"; then
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
          else
            echo "conflicts=true" >> "$GITHUB_OUTPUT"
            # Commit with conflict markers so reviewers can see what needs resolving.
            git add -A
            git commit --no-verify -m "merge: upstream/${{ steps.prep.outputs.ref }} (CONFLICTS)" || true
          fi

      - name: Push branch
        if: steps.prep.outputs.behind != '0'
        run: git push origin "${{ steps.prep.outputs.branch }}" --force-with-lease

      - name: Open PR
        if: steps.prep.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="chore: sync from upstream ($(date -u +%Y-%m-%d))"
          BODY=$(cat <<EOF
          Automated weekly sync from \`open-telemetry/opentelemetry-demo@${{ steps.prep.outputs.ref }}\`.

          - Upstream tip: \`${{ steps.prep.outputs.upstream_sha }}\`
          - Fork is **${{ steps.prep.outputs.behind }}** commits behind, **${{ steps.prep.outputs.ahead }}** ahead.
          - Merge had conflicts: **${{ steps.merge.outputs.conflicts || 'false' }}**

          If there are conflicts, the merge commit contains conflict markers — resolve locally
          (\`git checkout ${{ steps.prep.outputs.branch }} && git merge --abort && git merge upstream/${{ steps.prep.outputs.ref }}\`) and push.

          Custom patches that may need attention on conflict:
          - \`src/frontend/utils/imageLoader.js\` — relative-URL loader
          - \`src/frontend/next.config.js\` — Faro source-map plugin wiring
          - \`src/frontend/Dockerfile\` — Faro build args
          - \`.github/workflows/publish-frontend.yml\` — Faro publish flow
          - \`.github/workflows/publish-components.yml\` — fork image build
          - \`.github/workflows/sync-upstream.yml\` — this workflow

          🤖 Generated by \`sync-upstream.yml\`.
          EOF
          )
          gh pr create \
            --title "$TITLE" \
            --body "$BODY" \
            --base main \
            --head "${{ steps.prep.outputs.branch }}" \
            --label "upstream-sync" || \
          gh pr edit "${{ steps.prep.outputs.branch }}" --add-label "upstream-sync"
